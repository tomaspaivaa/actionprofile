name: Vprofile CICD Workflow
on: 
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main
  workflow_dispatch:
  schedule:
    - cron: "10 14 * * 1-5"   # After noon 2:10 pm, Monday to Friday

env:
  # Muda para o nome que queres dar ao teu repositório no Docker Hub
  DOCKER_REPOSITORY: 'vprofileapp' 

permissions: 
  contents: read

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Maven Build
        run: mvn install

      - name: Upload Build Artifact (WAR)
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war

      - name: Notify if Build Fails
        if: failure()
        run: echo "🚨 Build job failed! Please check logs."

  Testing:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests on main branch
        if: github.ref == 'refs/heads/main'
        run: mvn test

      - name: Checkstyle
        if: github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle

      - name: Run tests on other branches
        if: github.ref != 'refs/heads/main'
        run: echo "Skipping unit tests and code analysis"

  Security_Scan:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master # <-- Corrigido para master!
        with:
          scan-type: fs
          scan-ref: .
          format: json
          exit-code: 0
          vuln-type: os,library
          output: trivy-results.json

      - name: Upload Trivy scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.json

  # --- A TUA NOVA FASE DO DOCKER HUB ---
  BUILD_AND_PUBLISH:
    name: BUILD_AND_PUBLISH
    runs-on: ubuntu-latest
    needs: [Build, Testing, Security_Scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Faz login no teu Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Constrói a imagem e envia-a!
      - name: Build, tag, and push image to Docker Hub
        env:
          IMAGE_TAG: ${{ github.sha }} # Isto vai dar um nome único à imagem (ex: abd1234)
        run: |
          # 2.1 - Compilar a imagem
          docker build -f Docker-files/app/multistage/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPOSITORY:$IMAGE_TAG .
          
          # 2.2 - Criar a cópia com a tag 'latest'
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPOSITORY:$IMAGE_TAG ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPOSITORY:latest
          
          # 2.3 - Enviar para o Docker Hub
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPOSITORY:$IMAGE_TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPOSITORY:latest